<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<title>Camera Control</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #111; color: #eee; font-family: -apple-system, sans-serif;
    -webkit-user-select: none; user-select: none;
    overflow-x: hidden;
  }

  /* Live preview */
  #preview-wrap {
    width: 100%; aspect-ratio: 4/3; background: #000;
    display: flex; align-items: center; justify-content: center;
    position: relative; overflow: hidden;
  }
  #preview-wrap img {
    width: 100%; height: 100%; object-fit: contain;
  }
  #placeholder {
    color: #555; font-size: 1.1rem; text-align: center;
    position: absolute;
  }

  /* Control bar */
  #controls {
    display: flex; gap: 8px; padding: 10px 8px;
    flex-wrap: wrap; justify-content: center;
  }
  #controls button {
    flex: 1 1 0; min-width: 70px; max-width: 160px;
    padding: 12px 6px; border: 1px solid #333; border-radius: 8px;
    background: #1a1a1a; color: #ccc; font-size: 0.85rem;
    font-weight: 600; cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  #controls button.active {
    background: #2a5c2a; border-color: #4a4; color: #fff;
  }
  #controls button.pressed {
    background: #333;
  }
  #capture-btn {
    background: #8b1a1a !important; border-color: #c44 !important; color: #fff !important;
  }
  #capture-btn.pressed {
    background: #c44 !important;
  }

  /* Gallery */
  #gallery-header {
    padding: 12px 12px 4px; font-size: 0.8rem; color: #666;
    display: flex; justify-content: space-between; align-items: center;
  }
  #gallery {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
    gap: 6px; padding: 6px 8px 40px;
  }
  .thumb {
    background: #1a1a1a; border-radius: 6px; overflow: hidden;
    cursor: pointer;
  }
  .thumb img {
    width: 100%; aspect-ratio: 1; object-fit: cover; display: block;
  }
  .thumb-info {
    padding: 4px 6px; font-size: 0.65rem; color: #888;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .thumb-info .app-tag {
    color: #6a6; font-weight: 600;
  }

  /* Lightbox */
  #lightbox {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95);
    z-index: 100; align-items: center; justify-content: center;
    flex-direction: column;
  }
  #lightbox.open { display: flex; }
  #lightbox img {
    max-width: 95vw; max-height: 85vh; object-fit: contain;
  }
  #lightbox .lb-close {
    position: absolute; top: 12px; right: 16px;
    font-size: 2rem; color: #888; cursor: pointer;
  }
  #lightbox .lb-name {
    margin-top: 8px; font-size: 0.75rem; color: #666;
  }
</style>
</head>
<body>

<div id="preview-wrap">
  <img id="stream-img" style="display:none" />
  <div id="placeholder">No active app</div>
</div>

<div id="controls">
  <button data-app="dual-cam-raw" onclick="switchApp('dual-cam-raw')">Raw</button>
  <button data-app="dual-cam-pixmix" onclick="switchApp('dual-cam-pixmix')">Pixmix</button>
  <button data-app="slit-scan-1" onclick="switchApp('slit-scan-1')">Slit Scan</button>
  <button id="capture-btn" onclick="doCapture()">Capture</button>
</div>

<div id="gallery-header">
  <span>Recent captures</span>
  <span id="photo-count"></span>
</div>
<div id="gallery"></div>

<div id="lightbox" onclick="closeLightbox()">
  <span class="lb-close">&times;</span>
  <img id="lb-img" src="" />
  <div class="lb-name" id="lb-name"></div>
</div>

<script>
const streamImg = document.getElementById('stream-img');
const placeholder = document.getElementById('placeholder');
const gallery = document.getElementById('gallery');
const photoCount = document.getElementById('photo-count');
const appButtons = document.querySelectorAll('[data-app]');
const captureBtn = document.getElementById('capture-btn');

let currentApp = null;
let galleryTimer = null;

// --- Status polling ---
async function pollStatus() {
  try {
    const r = await fetch('/status');
    const d = await r.json();
    currentApp = d.active_app_name;

    // Update stream visibility
    if (currentApp && d.frame_available) {
      if (streamImg.style.display === 'none') {
        streamImg.src = '/stream?' + Date.now();
      }
      streamImg.style.display = 'block';
      placeholder.style.display = 'none';
    } else {
      streamImg.style.display = 'none';
      streamImg.src = '';
      placeholder.style.display = 'block';
      placeholder.textContent = currentApp ? 'Waiting for frames...' : 'No active app';
    }

    // Update button highlights
    appButtons.forEach(btn => {
      btn.classList.toggle('active', btn.dataset.app === currentApp);
    });
  } catch (e) {
    // ignore
  }
}

// --- App switching ---
async function switchApp(name) {
  const btn = document.querySelector(`[data-app="${name}"]`);
  flashButton(btn);
  try {
    await fetch('/switch/' + name, { method: 'POST' });
  } catch (e) {}
  setTimeout(pollStatus, 500);
}

// --- Capture ---
async function doCapture() {
  flashButton(captureBtn);
  try {
    await fetch('/capture', { method: 'POST' });
  } catch (e) {}
  // Refresh gallery after a short delay (capture takes time)
  setTimeout(loadGallery, 3000);
}

// --- Button feedback ---
function flashButton(btn) {
  btn.classList.add('pressed');
  setTimeout(() => btn.classList.remove('pressed'), 200);
}

// --- Gallery ---
async function loadGallery() {
  try {
    const r = await fetch('/photos');
    const photos = await r.json();
    photoCount.textContent = photos.length + ' photos';
    gallery.innerHTML = '';
    photos.forEach(p => {
      const div = document.createElement('div');
      div.className = 'thumb';
      div.onclick = () => openLightbox(p);

      const img = document.createElement('img');
      img.loading = 'lazy';
      img.src = '/photo/' + encodeURIComponent(p.path);

      const info = document.createElement('div');
      info.className = 'thumb-info';
      const ts = new Date(p.modified_timestamp * 1000);
      const timeStr = ts.toLocaleString(undefined, {
        month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit'
      });
      info.innerHTML = '<span class="app-tag">' + escHtml(p.app) + '</span> ' + timeStr;

      div.appendChild(img);
      div.appendChild(info);
      gallery.appendChild(div);
    });
  } catch (e) {}
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// --- Lightbox ---
function openLightbox(photo) {
  document.getElementById('lb-img').src = '/photo/' + encodeURIComponent(photo.path);
  document.getElementById('lb-name').textContent = photo.filename;
  document.getElementById('lightbox').classList.add('open');
}

function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
  document.getElementById('lb-img').src = '';
}

// --- Init ---
pollStatus();
setInterval(pollStatus, 2000);
loadGallery();
galleryTimer = setInterval(loadGallery, 10000);
</script>
</body>
</html>
